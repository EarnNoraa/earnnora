<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Earn Nora AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050814;
color:white;
padding:18px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.logo{
font-size:34px;
font-weight:bold;
}

.logo span{
color:#00ff88;
}

.notify{
background:#11192d;
padding:12px 15px;
border-radius:50px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:20px;
}

.card{
background:#0d1324;
padding:18px;
border-radius:18px;
text-align:center;
}

.card h2{
margin:0;
color:#00ff88;
}

.deposit-box{
background:linear-gradient(
90deg,
#2a1c10,
#1b1220
);
border:1px solid #4e3620;
padding:20px;
border-radius:24px;
margin-bottom:25px;
}

.progress{
height:8px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

.bar{
height:100%;
width:40%;
background:#00ff88;
}

.section{
margin-top:20px;
font-weight:bold;
font-size:20px;
}

.assets{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin-top:18px;
}

.asset{
background:#0d1324;
border:2px solid transparent;
border-radius:20px;
padding:20px 10px;
text-align:center;
cursor:pointer;
}

.asset.active{
border-color:#00ff88;
}

.coin{
font-size:28px;
margin-bottom:8px;
}

.depositBtn{
width:100%;
margin-top:25px;
padding:18px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:bold;
background:#00ff88;
color:black;
}

.bottomnav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#08101e;
display:flex;
justify-content:space-around;
padding:18px;
font-size:24px;
}

</style>
</head>
<body>

<div class="top">
<div class="logo">
Earn<span>Nora</span> AI
</div>

<div class="notify">
🔔
</div>
</div>


<div class="stats">

<div class="card">
<h2>$2.4M+</h2>
Paid Out
</div>

<div class="card">
<h2>861+</h2>
Investors
</div>

<div class="card">
<h2>67%</h2>
Win Rate
</div>

</div>


<div class="deposit-box">
💰 Deposit 30 USDT unlock Silver bonus

<div class="progress">
<div class="bar"></div>
</div>

<div style="margin-top:12px">
12 / 30 USDT Deposited
</div>

</div>


<div class="section">
Select Asset
</div>

<div class="assets">

<div class="asset active">
<div class="coin">₮</div>
USDT
</div>

<div class="asset">
<div class="coin">₿</div>
BTC
</div>

<div class="asset">
<div class="coin">Ξ</div>
ETH
</div>

<div class="asset">
<div class="coin">◎</div>
SOL
</div>

<div class="asset">
<div class="coin">BNB</div>
BNB
</div>

<div class="asset">
<div class="coin">TRX</div>
TRON
</div>

</div>

<button class="depositBtn"
onclick="depositNow()">
DEPOSIT NOW
</button>


<div class="bottomnav">
🏠
📈
💼
👥
⚙️
</div>

<script>

const tg=window.Telegram.WebApp;
tg.expand();

function depositNow(){

tg.showAlert(
'Redirecting to deposit...'
);

tg.sendData(
JSON.stringify({
action:'deposit',
asset:'USDT'
})
);

}

document.querySelectorAll('.asset')
.forEach(a=>{
a.onclick=function(){

document.querySelectorAll('.asset')
.forEach(x=>x.classList.remove('active'));

this.classList.add('active');

}
});

</script>

</body>
</html>
