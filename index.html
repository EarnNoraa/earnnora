<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>Earn Nora AI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#050814;
color:white;
padding:18px 18px 90px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.logo{
font-size:34px;
font-weight:700;
}

.logo span{
color:#00ff88;
}

.notify{
background:#11192d;
padding:12px 16px;
border-radius:50px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:20px;
}

.card{
background:#0d1324;
padding:18px;
border-radius:18px;
text-align:center;
}

.card h2{
margin-bottom:8px;
color:#00ff88;
font-size:20px;
}

.deposit-box{
background:linear-gradient(
90deg,
#2a1c10,
#1b1220
);
border:1px solid #4e3620;
padding:20px;
border-radius:24px;
margin-bottom:25px;
}

.progress{
height:8px;
background:#222;
border-radius:30px;
overflow:hidden;
margin-top:14px;
}

.bar{
height:100%;
width:40%;
background:#00ff88;
}

.section{
margin-top:22px;
font-size:22px;
font-weight:bold;
}

.assets{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin-top:18px;
}

.asset{
background:#0d1324;
border:2px solid transparent;
border-radius:18px;
padding:18px 10px;
text-align:center;
cursor:pointer;
transition:.2s;
}

.asset.active{
border-color:#00ff88;
background:#101a34;
}

.coin{
font-size:28px;
margin-bottom:8px;
}

.amountBox{
margin-top:22px;
}

.amountBox input{
width:100%;
padding:16px;
border:none;
border-radius:16px;
margin-top:12px;
background:#11192d;
color:white;
font-size:17px;
}

.depositBtn{
width:100%;
margin-top:20px;
padding:18px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:bold;
background:#00ff88;
color:black;
cursor:pointer;
}

.bottomnav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#08101e;
display:flex;
justify-content:space-around;
padding:18px;
font-size:24px;
}

</style>
</head>

<body>

<div class="top">
<div class="logo">
Earn<span>Nora</span> AI
</div>

<div class="notify">
🔔
</div>
</div>


<div class="stats">

<div class="card">
<h2>$2.4M+</h2>
Paid Out
</div>

<div class="card">
<h2>861+</h2>
Users
</div>

<div class="card">
<h2>67%</h2>
AI Win Rate
</div>

</div>


<div class="deposit-box">
💰 Deposit 30 USDT unlock Silver Bonus

<div class="progress">
<div class="bar"></div>
</div>

<div style="margin-top:12px">
12 / 30 USDT Progress
</div>
</div>



<div class="section">
Select Asset
</div>

<div class="assets">

<div class="asset active">
<div class="coin">₮</div>
USDT
</div>

<div class="asset">
<div class="coin">₿</div>
BTC
</div>

<div class="asset">
<div class="coin">Ξ</div>
ETH
</div>

<div class="asset">
<div class="coin">◎</div>
SOL
</div>

<div class="asset">
<div class="coin">BNB</div>
BNB
</div>

<div class="asset">
<div class="coin">TRX</div>
TRON
</div>

</div>


<div class="amountBox">
Deposit Amount

<input
id="amount"
type="number"
value="30"
placeholder="Enter USDT">
</div>



<button
class="depositBtn"
onclick="depositNow()">
DEPOSIT NOW
</button>


<div class="bottomnav">
🏠
📈
💼
👥
⚙️
</div>



<script>

const tg=window.Telegram.WebApp;

tg.ready();
tg.expand();

let selectedAsset="USDT";


// asset select
document.querySelectorAll('.asset')
.forEach(asset=>{

asset.onclick=function(){

document.querySelectorAll('.asset')
.forEach(
x=>x.classList.remove('active')
);

this.classList.add('active');

selectedAsset=
this.innerText
.trim()
.split("\n")
.pop();

if(tg.HapticFeedback){
tg.HapticFeedback
.impactOccurred('medium');
}

};

});



// deposit function
function depositNow(){

let amount=
document.getElementById(
"amount"
).value;


if(!amount || amount<=0){
tg.showAlert(
"Enter valid amount"
);
return;
}

tg.MainButton
.setText(
"Creating Deposit..."
)
.show();


const payload={
action:"deposit",
asset:selectedAsset,
amount:amount,
plan:"Silver Bonus"
};


// sends to python bot
tg.sendData(
JSON.stringify(payload)
);


setTimeout(()=>{

tg.showPopup({
title:"Deposit Submitted",
message:
amount+
" "+
selectedAsset+
" request sent successfully.",
buttons:[
{
type:"ok"
}
]
});

},500);

}

</script>

</body>
</html>
