<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn Nora</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    font-family: Arial;
    background: #000;
    color: white;
    text-align: center;
    padding: 20px;
}

.card {
    background: #111;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid transparent;
}

.card.active {
    border: 2px solid #00ff88;
}

button {
    background: #00ff88;
    border: none;
    padding: 15px;
    width: 100%;
    border-radius: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>Earn Nora Plans</h2>

<div class="card" onclick="selectPlan('Standard', '0.5', this)">
    Standard Plan <br> 0.5% Daily
</div>

<div class="card" onclick="selectPlan('Premium', '1.0', this)">
    Premium Plan <br> 1.0% Daily
</div>

<button onclick="continueNow()">CONTINUE</button>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let selectedPlan = null;

function selectPlan(name, percent, el) {

    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');

    selectedPlan = {
        plan: name,
        percent: percent
    };

    tg.HapticFeedback.impactOccurred('medium');
}

function continueNow() {

    if (!selectedPlan) {
        tg.showAlert("Please select a plan first!");
        return;
    }

    // Send data to Telegram bot
    tg.sendData(JSON.stringify(selectedPlan));

    tg.MainButton.setText("Processing...");
    tg.MainButton.show();
}
</script>

</body>
</html>
